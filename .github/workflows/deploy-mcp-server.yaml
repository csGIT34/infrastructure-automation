name: Deploy MCP Server

on:
  push:
    branches:
      - main
    paths:
      - 'mcp-server/**'
      - 'config/patterns/**'
      - '.github/workflows/deploy-mcp-server.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - staging

concurrency:
  group: mcp-server-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/infrastructure-mcp-server

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.short_sha.outputs.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get short SHA
        id: short_sha
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: mcp-server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    name: Deploy to Azure
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'prod' }}

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure secrets
        env:
          DEPLOY_ENV: ${{ inputs.environment || 'prod' }}
          APP_ID_VALUE: ${{ secrets.INFRA_APP_ID }}
          APP_KEY_VALUE: ${{ secrets.INFRA_APP_PRIVATE_KEY }}
        run: |
          az containerapp secret set \
            --name "ca-mcp-${DEPLOY_ENV}" \
            --resource-group "rg-mcp-${DEPLOY_ENV}" \
            --secrets "infra-app-id=${APP_ID_VALUE}" "infra-app-private-key=${APP_KEY_VALUE}"

      - name: Deploy Container App
        env:
          DEPLOY_ENV: ${{ inputs.environment || 'prod' }}
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="${{ env.REGISTRY }}/${REPO_LOWER}/infrastructure-mcp-server:${{ needs.build.outputs.image_tag }}"

          az containerapp update \
            --name "ca-mcp-${DEPLOY_ENV}" \
            --resource-group "rg-mcp-${DEPLOY_ENV}" \
            --image "$IMAGE" \
            --set-env-vars \
              "MCP_TRANSPORT=streamable-http" \
              "INFRA_REPO=${{ github.repository }}" \
              "APP_INFRA_REPO=${{ github.repository_owner }}/app-infrastructure" \
              "INFRA_APP_ID=secretref:infra-app-id" \
              "INFRA_APP_PRIVATE_KEY=secretref:infra-app-private-key" \
              "AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" \
              "MCP_ENTRA_CLIENT_ID=${{ vars.MCP_ENTRA_CLIENT_ID }}" \
              "MCP_SERVER_URL=https://ca-mcp-${DEPLOY_ENV}.mangoflower-3bcf53fc.centralus.azurecontainerapps.io" \
            --remove-env-vars PORT NODE_ENV

      - name: Health Check
        env:
          DEPLOY_ENV: ${{ inputs.environment || 'prod' }}
        run: |
          MCP_URL=$(az containerapp show \
            --name "ca-mcp-${DEPLOY_ENV}" \
            --resource-group "rg-mcp-${DEPLOY_ENV}" \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          echo "Waiting for deployment..."
          sleep 15

          for i in {1..10}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://$MCP_URL/mcp" 2>/dev/null || echo "000")
            echo "Attempt $i/10... HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -le 401 ]; then
              echo "Health check passed (HTTP $HTTP_CODE)"
              exit 0
            fi
            sleep 10
          done

          echo "::warning::Health check did not pass within timeout (container may still be starting)"
