name: Validate Pattern Sync

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'config/patterns/*.yaml'
      - 'terraform/patterns/*/main.tf'
  push:
    branches:
      - main
    paths:
      - 'config/patterns/*.yaml'
      - 'terraform/patterns/*/main.tf'

jobs:
  validate-sync:
    name: Validate patterns are in sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate pattern sync
        run: |
          python3 << 'EOF'
          import json
          import yaml
          from pathlib import Path

          errors = []

          # Get patterns from terraform/patterns directories
          tf_patterns = sorted([
              p.name for p in Path('terraform/patterns').iterdir()
              if p.is_dir() and (p / 'main.tf').exists()
          ])

          # Get patterns from config/patterns/*.yaml
          config_patterns = []
          for f in Path('config/patterns').glob('*.yaml'):
              with open(f) as fh:
                  data = yaml.safe_load(fh)
                  if data and 'name' in data:
                      config_patterns.append(data['name'])
          config_patterns.sort()

          print(f"Terraform patterns: {tf_patterns}")
          print(f"Config patterns:    {config_patterns}")

          # Check sync
          missing_config = set(tf_patterns) - set(config_patterns)
          extra_config = set(config_patterns) - set(tf_patterns)

          if missing_config:
              errors.append(f"Patterns in terraform/ but not in config/: {list(missing_config)}")
          if extra_config:
              errors.append(f"Patterns in config/ but not in terraform/: {list(extra_config)}")

          # Check each pattern has VERSION file
          for p in tf_patterns:
              version_file = Path(f'terraform/patterns/{p}/VERSION')
              if not version_file.exists():
                  errors.append(f"Missing VERSION file for pattern: {p}")

          if errors:
              for e in errors:
                  print(f"ERROR: {e}")
              exit(1)

          print("All patterns are in sync!")
          EOF
