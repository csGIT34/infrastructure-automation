# Terraform Apply Workflow (Folder-Based GitOps)
#
# Triggered on push to main when terraform.tfvars.json files change.
# Folder structure: {app_id}/{app_name}/{environment}/{pattern}/terraform.tfvars.json
#
# For each changed tfvars file:
# 1. Parses the 4-part path to determine app, env, and pattern
# 2. Checks out the pattern repo (terraform-azurerm-{pattern}//pattern or terraform-pattern-{pattern})
# 3. terraform init with backend config
# 4. terraform plan + apply

name: Terraform Apply

run-name: "apply: ${{ github.sha }}"

on:
  push:
    branches:
      - main
    paths:
      - '**/terraform.tfvars.json'

env:
  TERRAFORM_VERSION: '1.6.0'
  TF_IN_AUTOMATION: 'true'

permissions:
  id-token: write
  contents: read

jobs:
  parse-changes:
    name: Parse Changes
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_changes: ${{ steps.detect.outputs.has_changes }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed tfvars and build matrix
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep 'terraform.tfvars.json' || true)

          if [ -z "$CHANGED" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "matrix=[]" >> $GITHUB_OUTPUT
            exit 0
          fi

          MATRIX="["
          FIRST=true

          while IFS= read -r file; do
            [ -z "$file" ] && continue

            # Parse 4-part path: {app_id}/{app_name}/{environment}/{pattern}/terraform.tfvars.json
            APP_ID=$(echo "$file" | cut -d'/' -f1)
            APP_NAME=$(echo "$file" | cut -d'/' -f2)
            ENV=$(echo "$file" | cut -d'/' -f3)
            PATTERN=$(echo "$file" | cut -d'/' -f4)

            # Validate all parts exist
            if [ -z "$APP_ID" ] || [ -z "$APP_NAME" ] || [ -z "$ENV" ] || [ -z "$PATTERN" ]; then
              echo "::warning::Skipping invalid path: $file"
              continue
            fi

            # Validate formats
            if [[ ! "$APP_ID" =~ ^[a-zA-Z0-9_-]+$ ]]; then
              echo "::warning::Invalid app_id: $APP_ID"
              continue
            fi
            if [[ ! "$APP_NAME" =~ ^[a-zA-Z0-9_-]+$ ]]; then
              echo "::warning::Invalid app_name: $APP_NAME"
              continue
            fi
            if [[ ! "$PATTERN" =~ ^[a-zA-Z0-9_-]+$ ]]; then
              echo "::warning::Invalid pattern: $PATTERN"
              continue
            fi

            VALID_ENVS="dev staging prod"
            if [[ ! " $VALID_ENVS " =~ " $ENV " ]]; then
              echo "::warning::Invalid environment: $ENV"
              continue
            fi

            # Determine pattern repo and terraform directory
            # Convert underscores to hyphens for repo naming convention
            PATTERN_HYPHEN=$(echo "$PATTERN" | tr '_' '-')
            COMPOSITES="web_backend"
            if echo "$COMPOSITES" | grep -qw "$PATTERN"; then
              REPO="terraform-pattern-${PATTERN_HYPHEN}"
              TF_DIR="."
            else
              REPO="terraform-azurerm-${PATTERN_HYPHEN}"
              TF_DIR="pattern"
            fi

            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              MATRIX="$MATRIX,"
            fi

            FOLDER_PATH="${APP_ID}/${APP_NAME}/${ENV}/${PATTERN}"
            MATRIX="$MATRIX{\"app_id\":\"$APP_ID\",\"app_name\":\"$APP_NAME\",\"environment\":\"$ENV\",\"pattern\":\"$PATTERN\",\"repo\":\"$REPO\",\"tf_dir\":\"$TF_DIR\",\"folder_path\":\"$FOLDER_PATH\"}"
          done <<< "$CHANGED"

          MATRIX="$MATRIX]"

          if [ "$MATRIX" = "[]" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  apply:
    name: "apply: ${{ matrix.folder_path }}"
    runs-on: ubuntu-latest
    needs: parse-changes
    if: needs.parse-changes.outputs.has_changes == 'true'
    environment: ${{ matrix.environment }}

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.parse-changes.outputs.matrix) }}

    concurrency:
      group: apply-${{ matrix.app_id }}-${{ matrix.environment }}-${{ matrix.pattern }}
      cancel-in-progress: false

    env:
      DEPLOY_ENV: ${{ matrix.environment }}

    steps:
      - name: Checkout app-infrastructure
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.INFRA_APP_ID }}
          private-key: ${{ secrets.INFRA_APP_PRIVATE_KEY }}
          repositories: ${{ matrix.repo }},terraform-azurerm-naming,terraform-azurerm-resource-group,terraform-azurerm-key-vault,terraform-azurerm-postgresql,terraform-azurerm-container-app,terraform-azurerm-container-registry,terraform-azurerm-security-groups,terraform-azurerm-rbac-assignments

      - name: Checkout pattern repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/${{ matrix.repo }}
          path: pattern-repo
          ref: v1.1.0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Select Azure credentials
        id: creds
        run: |
          case "$DEPLOY_ENV" in
            dev)     echo "client_id=AZURE_CLIENT_ID_dev" >> $GITHUB_OUTPUT ;;
            staging) echo "client_id=AZURE_CLIENT_ID_staging" >> $GITHUB_OUTPUT ;;
            prod)    echo "client_id=AZURE_CLIENT_ID_prod" >> $GITHUB_OUTPUT ;;
          esac

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets[steps.creds.outputs.client_id] }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure git for private modules
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config --global url."https://x-access-token:${APP_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Copy tfvars to pattern directory
        env:
          FOLDER_PATH: ${{ matrix.folder_path }}
          TF_DIR: ${{ matrix.tf_dir }}
        run: |
          cp "${FOLDER_PATH}/terraform.tfvars.json" \
             "pattern-repo/${TF_DIR}/terraform.tfvars.json"

      - name: Terraform Init
        working-directory: pattern-repo/${{ matrix.tf_dir }}
        env:
          ARM_CLIENT_ID: ${{ secrets[steps.creds.outputs.client_id] }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
          TF_STATE_RG: ${{ vars.TF_STATE_RESOURCE_GROUP }}
          TF_STATE_SA: ${{ secrets.TF_STATE_STORAGE_ACCOUNT }}
          TF_STATE_CONTAINER: ${{ vars.TF_STATE_CONTAINER }}
          FOLDER_PATH: ${{ matrix.folder_path }}
        run: |
          terraform init \
            -backend-config="${GITHUB_WORKSPACE}/${FOLDER_PATH}/backend.hcl" \
            -backend-config="resource_group_name=${TF_STATE_RG}" \
            -backend-config="storage_account_name=${TF_STATE_SA}" \
            -backend-config="container_name=${TF_STATE_CONTAINER:-tfstate}"

      - name: Terraform Plan
        working-directory: pattern-repo/${{ matrix.tf_dir }}
        env:
          ARM_CLIENT_ID: ${{ secrets[steps.creds.outputs.client_id] }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
        run: |
          terraform plan \
            -var-file=terraform.tfvars.json \
            -out=tfplan

      - name: Terraform Apply
        working-directory: pattern-repo/${{ matrix.tf_dir }}
        env:
          ARM_CLIENT_ID: ${{ secrets[steps.creds.outputs.client_id] }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
        run: terraform apply -auto-approve tfplan
        timeout-minutes: 45

      - name: Capture outputs
        if: success()
        working-directory: pattern-repo/${{ matrix.tf_dir }}
        env:
          ARM_CLIENT_ID: ${{ secrets[steps.creds.outputs.client_id] }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
          FOLDER_PATH: ${{ matrix.folder_path }}
        run: |
          echo "## ${FOLDER_PATH} Outputs" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          terraform output -json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo '{}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
