name: web_backend
description: |
  Composite pattern: Container App + PostgreSQL + Key Vault.
  Full web backend with database, secret management, and HTTP ingress.
category: composite
components:
  - resource-group
  - container-app
  - container-app-environment
  - postgresql
  - key-vault
  - security-groups
  - rbac-assignments
  - diagnostic-settings
use_cases:
  - Full-stack web application backend
  - API service with database
  - Microservice with persistent storage
sizing:
  small:
    dev: { cpu: 0.25, memory: "0.5Gi", min_replicas: 0, max_replicas: 1, postgresql_sku: "B_Standard_B1ms", postgresql_storage_mb: 32768 }
    staging: { cpu: 0.5, memory: "1Gi", min_replicas: 1, max_replicas: 2, postgresql_sku: "B_Standard_B2s", postgresql_storage_mb: 65536, enable_diagnostics: true }
    prod: { cpu: 0.5, memory: "1Gi", min_replicas: 2, max_replicas: 5, postgresql_sku: "GP_Standard_D2s_v3", postgresql_storage_mb: 131072, geo_redundant_backup: true, enable_diagnostics: true }
  medium:
    dev: { cpu: 0.5, memory: "1Gi", min_replicas: 0, max_replicas: 2, postgresql_sku: "B_Standard_B2s", postgresql_storage_mb: 65536 }
    staging: { cpu: 1.0, memory: "2Gi", min_replicas: 1, max_replicas: 5, postgresql_sku: "GP_Standard_D2s_v3", postgresql_storage_mb: 131072, enable_diagnostics: true }
    prod: { cpu: 1.0, memory: "2Gi", min_replicas: 2, max_replicas: 10, postgresql_sku: "GP_Standard_D4s_v3", postgresql_storage_mb: 262144, geo_redundant_backup: true, enable_diagnostics: true }
  large:
    dev: { cpu: 1.0, memory: "2Gi", min_replicas: 0, max_replicas: 3, postgresql_sku: "GP_Standard_D2s_v3", postgresql_storage_mb: 131072 }
    staging: { cpu: 2.0, memory: "4Gi", min_replicas: 2, max_replicas: 10, postgresql_sku: "GP_Standard_D4s_v3", postgresql_storage_mb: 262144, enable_diagnostics: true }
    prod: { cpu: 2.0, memory: "4Gi", min_replicas: 3, max_replicas: 20, postgresql_sku: "GP_Standard_D8s_v3", postgresql_storage_mb: 524288, geo_redundant_backup: true, enable_diagnostics: true }
config:
  required:
    - name
  optional:
    - container_image:
        type: string
        default: "mcr.microsoft.com/k8se/quickstart:latest"
        description: Container image to deploy
    - target_port:
        type: number
        default: 80
        description: Target port for ingress
    - postgresql_version:
        type: string
        default: "16"
        description: PostgreSQL version
estimated_costs:
  small:
    dev: 16
    staging: 60
    prod: 190
  medium:
    dev: 50
    staging: 185
    prod: 400
  large:
    dev: 175
    staging: 400
    prod: 850
